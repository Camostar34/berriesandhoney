[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''if G.OVERLAY_MENU and G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot') then'''
position = "after"
match_indent = true
payload = '''
local smsn_data = SMSN_build_gameover_data(false)
if smsn_data then
    local portrait_center = smsn_data.char_data.get_center and smsn_data.char_data.get_center() or nil

    if portrait_center then
        Jimbo = Card_Character({
            x = 0,
            y = 5,
            center = portrait_center
        })

        local spot = G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot')
        spot.config.object:remove()
        spot.config.object = Jimbo
        Jimbo.ui_object_updated = true
        Jimbo:add_speech_bubble(smsn_data.speech_key, nil, {quip = true})
        Jimbo:say_stuff(5)
        return true
    end
end
'''

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''if G.OVERLAY_MENU and G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot') then'''
position = "after"
match_indent = true
payload = '''
local smsn_data = SMSN_build_gameover_data(true)
if smsn_data then
    local portrait_center = smsn_data.char_data.get_center and smsn_data.char_data.get_center() or nil

    if portrait_center then
        Jimbo = Card_Character({
            x = 0,
            y = 5,
            center = portrait_center
        })

        local spot = G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot')
        spot.config.object:remove()
        spot.config.object = Jimbo
        Jimbo.ui_object_updated = true
        Jimbo:add_speech_bubble(smsn_data.speech_key, nil, {quip = true})
        Jimbo:say_stuff(5)

        if G.F_JAN_CTA then
            G.E_MANAGER:add_event(Event({
                func = function()
                    Jimbo:add_button(localize('b_wishlist'), 'wishlist_steam', G.C.DARK_EDITION, nil, true, 1.6)
                    return true
                end
            }))
        end

        return true
    end
end
'''

[[patches]]
[patches.pattern]
target = "card_character.lua"
pattern = 'self.config = {args = args}'
position = "after"
match_indent = true
payload = '''
if args and args.center then
    self.children.card = Card(
        self.T.x,
        self.T.y,
        G.CARD_W,
        G.CARD_H,
        G.P_CARDS.empty,
        args.center,
        {bypass_discovery_center = true}
    )
else
'''
        
[[patches]]
[patches.pattern]
target = "card_character.lua"
pattern = 'self.children.card.states.visible = false'
position = "before"
match_indent = true
payload = '''
end
'''