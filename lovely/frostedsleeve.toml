[manifest]
version = "1.0.0"
dump_lua = true
priority = 0


[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "self.config.center = center"
position = "after"
match_indent = true
payload = '''
if G.GAME and G.GAME.modifiers and G.GAME.modifiers.smsn_frosted_combo then
    if center and center.key == "m_smsn_cookie" then
        
        smsn_apply_random_glaze(self)
    end
end
'''