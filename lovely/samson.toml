[manifest]
version = "1.0.0"
dump_lua = true
priority = -10


[[patches]]  #   CHAK - Black Seal -- Thank you somethingcom515!
[patches.pattern]
target = '''functions/state_events.lua'''
pattern = '''
for k, v in ipairs(G.play.cards) do
    if (not v.shattered) and (not v.destroyed) then 
        draw_card(G.play,G.discard, it*100/play_count,'down', false, v)
        it = it + 1
    end
end
'''
position = "at"
payload = '''
local honeycards = {}
local has_samson = next(SMODS.find_card("j_smsn_samson", true)) ~= nil

for k, v in ipairs(G.play.cards) do
    if (not v.shattered) and (not v.destroyed) then
        if has_samson and SMODS.has_enhancement(v, 'm_gold') then
            -- Samson effect: keep gold cards in hand
            table.insert(honeycards, v)
        else
            -- Normal behavior: send to discard
            draw_card(G.play, G.discard, it*100/play_count, 'down', false, v)
        end

        it = it + 1
    end
end

if #honeycards > 0 then
    G.FUNCS.draw_from_play_to_hand(honeycards)
end
'''
overwrite = true
match_indent = true
